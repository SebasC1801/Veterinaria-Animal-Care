services:
  - type: web
    name: veterinaria-app
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/veterinary-system-1.0.0.jar
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m
      - key: MAVEN_OPTS
        value: -Xmx512m
